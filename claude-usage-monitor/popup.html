<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Claude Usage Monitor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Claude 사용량</h1>
        <p id="updated">아직 확인하지 않음</p>
      </div>
      <button id="refresh" type="button">새로고침</button>
    </header>

    <section id="metrics" aria-live="polite">
      <p class="empty">사용량을 확인하는 중입니다.</p>
    </section>

    <details>
      <summary>자동 확인 설정</summary>
      <label class="row">
        <span>자동 확인</span>
        <input id="autoCheck" type="checkbox">
      </label>
      <label>
        확인 주기
        <select id="intervalMinutes">
          <option value="15">15분</option>
          <option value="30">30분</option>
          <option value="60">1시간</option>
          <option value="120">2시간</option>
        </select>
      </label>
      <label class="row">
        <span>사용량 알림</span>
        <input id="notificationEnabled" type="checkbox">
      </label>
      <label>
        알림 기준
        <select id="threshold">
          <option value="70">70%</option>
          <option value="80">80%</option>
          <option value="90">90%</option>
          <option value="95">95%</option>
        </select>
      </label>
    </details>

    <a id="openUsage" href="#">Claude 사용량 페이지 열기</a>
    <p class="privacy">데이터는 이 브라우저에만 저장됩니다.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
